name: Stock Monitor Cloud

on:
  schedule:
    # GitHub Actions 使用 UTC 時間（台灣時間 = UTC + 8）
    # 盤中掃描 1: 台灣 09:30 (UTC 01:30)
    - cron: '30 1 * * 1-5'
    # 盤中掃描 2: 台灣 12:30 (UTC 04:30)
    - cron: '30 4 * * 1-5'
    # 收盤重點報告：台灣 20:00 (UTC 12:00)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式：evening（收盤重點）或 intraday（獵殺與籌碼掃描）'
        default: 'intraday'
  push:
    branches: [main]
    paths: ['.github/workflows/stock_monitor.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stock Monitor
        run: |
          # 判斷目前時間決定模式 (如果不是手動觸發)
          HOUR=$(date +%H)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$HOUR" -eq "12" ]; then
              RUN_MODE="evening"
            else
              RUN_MODE="intraday"
            fi
          else
            RUN_MODE="${{ github.event.inputs.mode }}"
          fi

          if [ "$RUN_MODE" = "intraday" ]; then
            echo "Mode: Intraday Hunter & Chip Scan"
            python cold_blooded_hunter.py
            python panic_bottom_hunter.py
            python cloud_notifier.py
          else
            echo "Mode: Evening Closing Report"
            python cloud_notifier.py evening
          fi

      - name: Generate static dashboard HTML
        run: |
          python generate_dashboard.py
          python taishin_target.py

      - name: Commit and push updated dashboard HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html taishin_target.html
          git diff-index --quiet HEAD || (git commit -m "Auto-update stock dashboard HTML" && git push)
