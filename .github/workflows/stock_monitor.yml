    1 name: Stock Monitor Cloud
    2
    3 on:
    4   schedule:
    5     - cron: '0 2 * * 1-5'
    6     - cron: '0 4 * * 1-5'
    7     - cron: '30 6 * * 1-5'
    8   workflow_dispatch:
    9
   10 jobs:
   11   build:
   12     runs-on: ubuntu-latest
   13     steps:
   14       - name: Checkout code
   15         uses: actions/checkout@v3
   16       - name: Set up Python
   17         uses: actions/setup-python@v4
   18         with:
   19           python-version: '3.11'
   20       - name: Install dependencies
   21         run: pip install requests yfinance pandas
   22       - name: Run Stock Monitor
   23         env:
   24           TG_TOKEN: ${{ secrets.TG_TOKEN }}
   25           TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
