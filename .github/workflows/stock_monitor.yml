name: Stock Monitor Cloud

on:
  schedule:
    # GitHub Actions 使用 UTC 時間（台灣時間 = UTC + 8）
    # 收盤重點報告（過熱/弱勢/核心 + 支撐壓力）：台灣 20:00
    - cron: '0 12 * * 1-5'   # 台灣 20:00 -> UTC 12:00
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式：evening（收盤重點，預設）或 intraday（盤中籌碼，已不排程）'
        default: 'evening'
  push:
    branches: [main]
    paths: ['.github/workflows/stock_monitor.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Telegram secrets are configured
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ]; then
            echo "::error::TG_TOKEN secret is not set. Go to repo Settings -> Secrets and variables -> Actions to add it."
            exit 1
          fi
          if [ -z "$TG_CHAT_ID" ]; then
            echo "::error::TG_CHAT_ID secret is not set."
            exit 1
          fi
          echo "Both secrets configured (TG_TOKEN length=${#TG_TOKEN}, TG_CHAT_ID length=${#TG_CHAT_ID})"

      - name: Run Stock Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 預設一律跑收盤重點報告（evening）；只有手動明確選 intraday 才跑盤中籌碼掃描
          if [ "${{ github.event.inputs.mode }}" = "intraday" ]; then
            echo "Mode: intraday chip scan"
            python cloud_notifier.py
          else
            echo "Mode: evening report"
            python cloud_notifier.py evening
          fi
