name: Stock Monitor Cloud

on:
  schedule:
    # GitHub Actions 使用 UTC 時間（台灣時間 = UTC + 8）
    # 台灣 10:00 -> UTC 02:00
    # 台灣 12:00 -> UTC 04:00
    # 台灣 14:30 -> UTC 06:30
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/stock_monitor.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests yfinance pandas

      - name: Run Stock Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python cloud_notifier.py
