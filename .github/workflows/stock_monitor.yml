name: Stock Monitor Cloud

on:
  schedule:
    # GitHub Actions 使用 UTC 時間（台灣時間 = UTC + 8）
    # 台灣 10:00 -> UTC 02:00
    # 台灣 12:00 -> UTC 04:00
    # 台灣 14:30 -> UTC 06:30
    - cron: '0 2 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/stock_monitor.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Telegram secrets are configured
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ]; then
            echo "::error::TG_TOKEN secret is not set. Go to repo Settings -> Secrets and variables -> Actions to add it."
            exit 1
          fi
          if [ -z "$TG_CHAT_ID" ]; then
            echo "::error::TG_CHAT_ID secret is not set."
            exit 1
          fi
          echo "Both secrets configured (TG_TOKEN length=${#TG_TOKEN}, TG_CHAT_ID length=${#TG_CHAT_ID})"

      - name: Run Stock Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python cloud_notifier.py
